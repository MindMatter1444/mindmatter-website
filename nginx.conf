server {
    listen 80;
    server_name mindmatter.no www.mindmatter.no;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mindmatter.no www.mindmatter.no;

    ssl_certificate     /etc/letsencrypt/live/mindmatter.no/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindmatter.no/privkey.pem;

    root /var/www/mindmatter/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache statiske assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → Node.js på port 3001
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SPA-routing — alt annet til index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
